<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASH-ANIME - Search & Stream</title>
    <link rel="preconnect" href="https://anime-search-api-burw.onrender.com">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --primary-black: #0a0a0a;
            --secondary-black: #1a1a1a;
            --tertiary-black: #2a2a2a;
            --accent-pink: #ff2d75;
            --accent-pink-light: #ff5e95;
            --accent-pink-dark: #c11252;
            --accent-neon: #ff00ff;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-tertiary: #a0a0a0;
            --border-color: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, var(--primary-black) 0%, #1a0a15 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        header {
            background: rgba(26, 26, 26, 0.95);
            padding: 15px 20px;
            border-bottom: 2px solid var(--accent-pink);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        main { padding: 30px 20px; max-width: 1400px; margin: 0 auto; }

        /* ===== CUSTOM VIDEO PLAYER ===== */
        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            border: 2px solid var(--accent-pink);
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.3);
        }

        .video-display {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #videoElement {
            width: 100%;
            height: 100%;
            display: block;
        }

        #iframeContainer {
            width: 100%;
            height: 100%;
            display: none;
        }

        #iframeContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Player Controls */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            padding: 30px 15px 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .player-wrapper:hover .player-controls {
            transform: translateY(0);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-neon));
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-bar:hover .progress-fill {
            box-shadow: 0 0 10px var(--accent-pink);
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            background: rgba(255, 45, 117, 0.2);
            border: 1px solid var(--accent-pink);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: var(--accent-pink);
            box-shadow: 0 0 15px rgba(255, 45, 117, 0.5);
            transform: scale(1.1);
        }

        .time-display {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent-pink);
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: var(--accent-pink);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .quality-select {
            background: rgba(255, 45, 117, 0.2);
            border: 1px solid var(--accent-pink);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        /* Buffering Indicator */
        .buffering-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 50;
        }

        .buffering-indicator.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 45, 117, 0.2);
            border-top: 4px solid var(--accent-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .buffering-text {
            color: var(--accent-pink);
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            font-weight: 600;
        }

        /* Info Panel */
        .info-panel {
            background: var(--secondary-black);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .anime-title { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        .episode-label { color: var(--accent-pink); font-weight: 700; margin-bottom: 15px; }

        .server-controls, .track-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            background: var(--tertiary-black);
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            color: white;
            box-shadow: 0 0 15px rgba(255, 45, 117, 0.4);
        }

        .btn:hover:not(.active) {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .episode-item {
            background: var(--tertiary-black);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .episode-item:hover {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        .episode-item.active {
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            color: white;
        }

        .status-text { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">🎬 DASH-ANIME</div>
</header>

<main>
    <div class="player-wrapper" id="playerWrapper">
        <div class="video-display">
            <video id="videoElement" controls playsinline></video>
            <div id="iframeContainer"></div>
            
            <!-- Buffering Indicator -->
            <div class="buffering-indicator" id="bufferingIndicator">
                <div class="spinner"></div>
                <div class="buffering-text">Buffering...</div>
            </div>
        </div>

        <!-- Custom Player Controls -->
        <div class="player-controls">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="controls-row">
                <div class="left-controls">
                    <button class="control-btn" id="playBtn" title="Play/Pause">▶</button>
                    <button class="control-btn" id="rewindBtn" title="Rewind 10s">⏮ 10s</button>
                    <button class="control-btn" id="forwardBtn" title="Forward 10s">⏭ 10s</button>
                    <div class="volume-control">
                        <button class="control-btn" id="volumeBtn" title="Mute">🔊</button>
                        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="100">
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="right-controls">
                    <select class="quality-select" id="qualitySelect">
                        <option value="">Quality</option>
                    </select>
                    <button class="control-btn" id="fullscreenBtn" title="Fullscreen">⛶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Info & Controls Panel -->
    <div class="info-panel">
        <h1 id="displayTitle" class="anime-title">Select an Anime</h1>
        <div id="displayEpisode" class="episode-label">Waiting for selection...</div>

        <div class="server-controls">
            <button id="server1Btn" class="btn active" onclick="switchServer(1)">SERVER 1 (HLS)</button>
            <button id="server2Btn" class="btn" onclick="switchServer(2)">SERVER 2 (MEGAPLAY)</button>
        </div>

        <div class="track-controls">
            <button id="subBtn" class="btn active" onclick="switchTrack('sub')">SUB</button>
            <button id="dubBtn" class="btn" onclick="switchTrack('dub')">DUB</button>
        </div>

        <div class="status-text" id="statusText">Ready</div>
    </div>

    <!-- Episodes Section -->
    <div>
        <h3 style="margin-bottom: 15px; color: var(--accent-pink);">Episodes</h3>
        <div id="episodesGrid" class="episodes-grid">
            <div class="episode-item active" onclick="playEpisode('12345', 1)">EP 1</div>
            <div class="episode-item" onclick="playEpisode('12346', 2)">EP 2</div>
            <div class="episode-item" onclick="playEpisode('12347', 3)">EP 3</div>
        </div>
    </div>
</main>

<script>
    const API_BASE = "https://anime-search-api-burw.onrender.com";
    let currentServer = 1;
    let currentTrack = 'sub';
    let currentEpisodeId = '12345';
    let hls = null;

    const videoElement = document.getElementById('videoElement');
    const iframeContainer = document.getElementById('iframeContainer');
    const bufferingIndicator = document.getElementById('bufferingIndicator');
    const statusText = document.getElementById('statusText');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const currentTimeDisplay = document.getElementById('currentTime');
    const durationDisplay = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeBtn = document.getElementById('volumeBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const playerWrapper = document.getElementById('playerWrapper');

    // ===== TIME FORMATTING =====
    function formatTime(seconds) {
        if (isNaN(seconds)) return '0:00';
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // ===== PLAY/PAUSE =====
    playBtn.addEventListener('click', () => {
        if (videoElement.style.display !== 'none') {
            if (videoElement.paused) {
                videoElement.play();
                playBtn.textContent = '⏸';
            } else {
                videoElement.pause();
                playBtn.textContent = '▶';
            }
        }
    });

    videoElement.addEventListener('play', () => { playBtn.textContent = '⏸'; });
    videoElement.addEventListener('pause', () => { playBtn.textContent = '▶'; });

    // ===== PROGRESS BAR =====
    videoElement.addEventListener('timeupdate', () => {
        const percent = (videoElement.currentTime / videoElement.duration) * 100 || 0;
        progressFill.style.width = percent + '%';
        currentTimeDisplay.textContent = formatTime(videoElement.currentTime);
    });

    videoElement.addEventListener('loadedmetadata', () => {
        durationDisplay.textContent = formatTime(videoElement.duration);
    });

    progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        videoElement.currentTime = percent * videoElement.duration;
    });

    // ===== REWIND/FORWARD =====
    document.getElementById('rewindBtn').addEventListener('click', () => {
        videoElement.currentTime = Math.max(0, videoElement.currentTime - 10);
    });

    document.getElementById('forwardBtn').addEventListener('click', () => {
        videoElement.currentTime = Math.min(videoElement.duration, videoElement.currentTime + 10);
    });

    // ===== VOLUME CONTROL =====
    volumeSlider.addEventListener('input', (e) => {
        videoElement.volume = e.target.value / 100;
        volumeBtn.textContent = e.target.value == 0 ? '🔇' : '🔊';
    });

    volumeBtn.addEventListener('click', () => {
        if (videoElement.volume > 0) {
            videoElement.volume = 0;
            volumeSlider.value = 0;
            volumeBtn.textContent = '🔇';
        } else {
            videoElement.volume = 0.8;
            volumeSlider.value = 80;
            volumeBtn.textContent = '🔊';
        }
    });

    // ===== FULLSCREEN =====
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            playerWrapper.requestFullscreen().catch(err => console.error(err));
        } else {
            document.exitFullscreen();
        }
    });

    // ===== BUFFERING INDICATOR =====
    videoElement.addEventListener('waiting', () => {
        bufferingIndicator.classList.add('active');
    });

    videoElement.addEventListener('canplay', () => {
        bufferingIndicator.classList.remove('active');
    });

    // ===== SERVER SWITCHING =====
    function switchServer(server) {
        if (server === currentServer) return;
        currentServer = server;

        document.getElementById('server1Btn').classList.toggle('active', server === 1);
        document.getElementById('server2Btn').classList.toggle('active', server === 2);

        loadStream();
    }

    // ===== TRACK SWITCHING =====
    function switchTrack(track) {
        currentTrack = track;
        document.getElementById('subBtn').classList.toggle('active', track === 'sub');
        document.getElementById('dubBtn').classList.toggle('active', track === 'dub');
        loadStream();
    }

    // ===== PLAY EPISODE =====
    function playEpisode(id, num) {
        currentEpisodeId = id;
        document.getElementById('displayEpisode').textContent = `Episode ${num}`;
        
        document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        
        loadStream();
    }

    // ===== LOAD STREAM =====
    async function loadStream() {
        statusText.textContent = "Loading...";
        bufferingIndicator.classList.add('active');

        // Reset players
        if (hls) {
            hls.destroy();
            hls = null;
        }
        videoElement.src = "";
        videoElement.style.display = "none";
        iframeContainer.innerHTML = "";
        iframeContainer.style.display = "none";

        if (currentServer === 1) {
            // SERVER 1: HLS
            try {
                const res = await fetch(`${API_BASE}/stream/v2/${currentEpisodeId}`);
                const data = await res.json();
                const m3u8Url = data[currentTrack]?.m3u8;

                if (m3u8Url) {
                    videoElement.style.display = "block";
                    if (Hls.isSupported()) {
                        hls = new Hls();
                        hls.loadSource(m3u8Url);
                        hls.attachMedia(videoElement);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            videoElement.play();
                            statusText.textContent = "Playing via Server 1 (HLS)";
                            bufferingIndicator.classList.remove('active');
                        });
                    } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                        videoElement.src = m3u8Url;
                        videoElement.addEventListener('loadedmetadata', () => {
                            videoElement.play();
                            statusText.textContent = "Playing via Server 1 (HLS)";
                            bufferingIndicator.classList.remove('active');
                        });
                    }
                } else {
                    throw new Error('No m3u8 URL');
                }
            } catch (err) {
                console.error(err);
                statusText.textContent = "Error loading Server 1. Try Server 2.";
                bufferingIndicator.classList.remove('active');
            }
        } else {
            // SERVER 2: Megaplay
            const megaplayUrl = `https://megaplay.buzz/stream/s-2/${currentEpisodeId}/${currentTrack}`;
            iframeContainer.innerHTML = `<iframe src="${megaplayUrl}" allowfullscreen></iframe>`;
            iframeContainer.style.display = "block";
            statusText.textContent = "Playing via Server 2 (Megaplay)";
            bufferingIndicator.classList.remove('active');
        }
    }

    // Initialize
    window.addEventListener('load', () => {
        loadStream();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            e.preventDefault();
            playBtn.click();
        } else if (e.key === 'ArrowRight') {
            videoElement.currentTime += 5;
        } else if (e.key === 'ArrowLeft') {
            videoElement.currentTime -= 5;
        } else if (e.key === 'f') {
            fullscreenBtn.click();
        }
    });
</script>

</body>
</html>
