<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO-ANIME | Stream Your Favorites</title>
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0a0a0a',
                        secondary: '#141414',
                        accent: '#ff006e',
                        'accent-glow': '#ff0080',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            --accent: #ff006e;
            --accent-glow: #ff0080;
        }
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) #141414;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        
        .glass {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .anime-card:hover .poster-overlay {
            opacity: 1;
        }
        .poster-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            transition: opacity 0.3s ease;
        }

        /* Custom Player Styles */
        .player-controls-gradient {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 110, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 110, 0.7); }
        }
        .glow-effect {
            animation: pulse-glow 2s infinite;
        }

        /* Netflix-style slider/grid */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans antialiased">
    <!-- Splash Screen -->
    <div id="splashScreen" class="fixed inset-0 z-[9999] bg-primary flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative w-24 h-24 mb-6">
            <div class="absolute inset-0 border-4 border-accent rounded-full glow-effect"></div>
            <img src="https://i.pinimg.com/736x/8e/1e/8e/8e1e8e9e8e9e8e9e8e9e8e9e8e9e8e9e.jpg" alt="Logo" class="w-full h-full rounded-full object-cover">
        </div>
        <h1 class="text-3xl font-black tracking-tighter text-accent uppercase">RO-ANIME</h1>
        <div class="flex space-x-2 mt-4">
            <div class="w-2 h-2 bg-accent rounded-full animate-bounce" style="animation-delay: 0s"></div>
            <div class="w-2 h-2 bg-accent rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-2 h-2 bg-accent rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-white/10 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <a href="/" class="flex items-center gap-2 group">
                <div class="w-10 h-10 rounded-full border-2 border-accent overflow-hidden group-hover:scale-110 transition-transform">
                    <img src="https://i.pinimg.com/736x/8e/1e/8e/8e1e8e9e8e9e8e9e8e9e8e9e8e9e8e9e.jpg" alt="Gojo" class="w-full h-full object-cover">
                </div>
                <span class="text-xl font-black tracking-tighter bg-gradient-to-r from-accent to-accent-glow bg-clip-text text-transparent uppercase">RO-ANIME</span>
            </a>

            <div class="flex-1 max-w-xl relative">
                <div class="relative flex items-center">
                    <input type="text" id="searchInput" placeholder="Search anime..." 
                        class="w-full bg-secondary border border-white/10 rounded-full py-2 px-5 pl-12 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all">
                    <svg class="absolute left-4 w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <div id="suggestions" class="absolute top-full left-0 right-0 mt-2 glass rounded-2xl overflow-hidden hidden z-50"></div>
            </div>

            <div class="hidden md:flex items-center gap-4">
                <button class="text-sm font-bold text-white/70 hover:text-white transition-colors">MOVIES</button>
                <button class="text-sm font-bold text-white/70 hover:text-white transition-colors">TV SERIES</button>
                <div class="w-8 h-8 rounded-full bg-accent flex items-center justify-center font-bold text-xs">A</div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Hero Section -->
        <section id="heroSection" class="mb-12">
            <div id="heroBanner" class="relative w-full h-[400px] rounded-3xl overflow-hidden border border-white/10 shadow-2xl group">
                <img id="heroImg" src="" class="w-full h-full object-cover" alt="Hero">
                <div class="absolute inset-0 bg-gradient-to-t from-primary via-primary/40 to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-8 md:p-12 w-full md:w-2/3">
                    <h2 id="heroTitle" class="text-4xl md:text-6xl font-black mb-4 leading-tight"></h2>
                    <div class="flex items-center gap-4 mb-6">
                        <span class="px-3 py-1 bg-accent rounded-md text-xs font-black uppercase">Trending</span>
                        <span class="text-white/60 text-sm font-medium">HD Quality</span>
                    </div>
                    <button id="heroPlayBtn" class="bg-white text-black px-8 py-3 rounded-full font-black flex items-center gap-2 hover:bg-accent hover:text-white transition-all transform hover:scale-105">
                        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        WATCH NOW
                    </button>
                </div>
            </div>
        </section>

        <!-- Home Content -->
        <div id="homeSection">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-black tracking-tight uppercase border-l-4 border-accent pl-4">Recently Updated</h3>
                <div class="flex gap-2">
                    <button class="p-2 glass rounded-full hover:bg-white/10 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg></button>
                    <button class="p-2 glass rounded-full hover:bg-white/10 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>
                </div>
            </div>
            <div id="homeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
                <!-- Skeleton Loader -->
                <template id="skeletonCard">
                    <div class="animate-pulse">
                        <div class="aspect-[2/3] bg-secondary rounded-2xl mb-3"></div>
                        <div class="h-4 bg-secondary rounded w-3/4 mb-2"></div>
                        <div class="h-3 bg-secondary rounded w-1/2"></div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Search Results -->
        <div id="searchResultsSection" class="hidden">
            <h3 id="searchQueryTitle" class="text-2xl font-black mb-8 uppercase">Search Results</h3>
            <div id="searchGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>

        <!-- Streaming Section -->
        <div id="streamingSection" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <!-- Player Column -->
                <div class="lg:col-span-3 space-y-6">
                    <div id="playerWrapper" class="relative aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl group">
                        <!-- Video Element -->
                        <video id="roVideoEl" class="w-full h-full" crossorigin="anonymous" playsinline></video>
                        
                        <!-- Iframe Fallback -->
                        <div id="roIframeWrap" class="absolute inset-0 hidden"></div>

                        <!-- Loading Spinner -->
                        <div id="roSpinner" class="absolute inset-0 flex items-center justify-center bg-black/60 hidden">
                            <div class="w-16 h-16 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
                        </div>

                        <!-- Center Play Button -->
                        <div id="roCenterPlay" class="absolute inset-0 flex items-center justify-center cursor-pointer group-hover:opacity-100 transition-opacity">
                            <div class="w-20 h-20 bg-accent/90 rounded-full flex items-center justify-center transform group-hover:scale-110 transition-transform shadow-2xl">
                                <svg class="w-10 h-10 text-white fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>

                        <!-- Controls -->
                        <div id="roControls" class="absolute bottom-0 left-0 right-0 p-6 player-controls-gradient translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                            <!-- Progress Bar -->
                            <div id="roProgress" class="relative w-full h-1.5 bg-white/20 rounded-full mb-4 cursor-pointer group/progress">
                                <div id="roProgBuf" class="absolute top-0 left-0 h-full bg-white/20 rounded-full"></div>
                                <div id="roProgFill" class="absolute top-0 left-0 h-full bg-accent rounded-full shadow-[0_0_10px_rgba(255,0,110,0.8)]"></div>
                                <div id="roProgThumb" class="absolute top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full scale-0 group-hover/progress:scale-100 transition-transform"></div>
                            </div>

                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-6">
                                    <button id="roPlayPause" class="hover:text-accent transition-colors">
                                        <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                    </button>
                                    <div class="text-sm font-bold">
                                        <span id="roCurTime">0:00</span> / <span id="roDur">0:00</span>
                                    </div>
                                    <div class="flex items-center gap-2 group/volume">
                                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                                        <input type="range" id="roVolume" min="0" max="1" step="0.1" value="1" class="w-0 group-hover/volume:w-20 transition-all accent-accent">
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <button id="roSettings" class="hover:text-accent transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></button>
                                    <button id="roFullscreen" class="hover:text-accent transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-wrap items-center justify-between gap-4 glass p-6 rounded-3xl">
                        <div>
                            <h2 id="streamTitle" class="text-3xl font-black uppercase mb-2"></h2>
                            <div class="flex items-center gap-3">
                                <span id="streamStatusBadge" class="px-2 py-0.5 rounded text-[10px] font-black uppercase bg-accent">Loading</span>
                                <span id="currentEpLabel" class="text-white/60 font-bold"></span>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="flex p-1 bg-secondary rounded-xl border border-white/5">
                                <button onclick="switchAudioTrack('sub')" id="subBtn" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all">SUB</button>
                                <button onclick="switchAudioTrack('dub')" id="dubBtn" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all">DUB</button>
                            </div>
                            <div class="flex p-1 bg-secondary rounded-xl border border-white/5">
                                <button onclick="switchServer(1)" id="srv1Btn" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all">HLS</button>
                                <button onclick="switchServer(2)" id="srv2Btn" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all">IFRAME</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar Column -->
                <div class="space-y-6">
                    <div class="glass p-6 rounded-3xl h-full flex flex-col">
                        <h4 class="text-xl font-black uppercase mb-6 border-b border-white/10 pb-4">Episodes</h4>
                        <div id="episodesList" class="flex-1 overflow-y-auto space-y-2 pr-2 hide-scrollbar max-h-[600px]">
                            <!-- Episodes will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for Episode Selection -->
    <div id="overlay" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-md flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="max-w-4xl w-full mx-4 glass p-8 rounded-3xl relative">
            <button onclick="closeOverlay()" class="absolute top-6 right-6 p-2 hover:bg-white/10 rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h3 id="overlayTitle" class="text-3xl font-black uppercase mb-8 pr-12"></h3>
            <div id="episodesContainer" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 max-h-[60vh] overflow-y-auto pr-4 hide-scrollbar"></div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE = 'https://fast-api-9anime-public.onrender.com'; // User's backend URL
        const apiCache = new Map();
        
        // State
        let currentStreamData = null;
        let currentAudioTrack = 'sub';
        let currentServer = 1;
        let hlsInstance = null;
        let searchTimeout = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            setupEventListeners();
        });

        async function initApp() {
            try {
                const response = await fetch(`${API_BASE}/home/thumbnails`);
                const data = await response.json();
                
                renderHero(data.hero_thumbnails);
                renderHomeGrid(data.thumbnails);
                
                // Hide splash
                setTimeout(() => {
                    const splash = document.getElementById('splashScreen');
                    splash.style.opacity = '0';
                    setTimeout(() => splash.style.display = 'none', 700);
                }, 1500);
            } catch (error) {
                console.error('Failed to init app:', error);
            }
        }

        function renderHero(heroes) {
            if (!heroes || heroes.length === 0) return;
            const hero = heroes[Math.floor(Math.random() * heroes.length)];
            const banner = document.getElementById('heroBanner');
            const img = document.getElementById('heroImg');
            const title = document.getElementById('heroTitle');
            
            img.src = hero.poster;
            title.textContent = hero.title;
            
            document.getElementById('heroPlayBtn').onclick = () => {
                fetchEpisodes(hero);
            };
        }

        function renderHomeGrid(items) {
            const grid = document.getElementById('homeGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                grid.appendChild(createAnimeCard(item));
            });
        }

        function createAnimeCard(item) {
            const div = document.createElement('div');
            div.className = 'anime-card group cursor-pointer';
            div.innerHTML = `
                <div class="relative aspect-[2/3] rounded-2xl overflow-hidden mb-3 border border-white/5 group-hover:border-accent/50 transition-colors">
                    <img src="${item.poster}" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-500" loading="lazy">
                    <div class="poster-overlay absolute inset-0 opacity-0 group-hover:opacity-100 flex items-center justify-center">
                        <div class="w-12 h-12 bg-accent rounded-full flex items-center justify-center shadow-2xl">
                            <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                </div>
                <h4 class="font-bold text-sm line-clamp-2 group-hover:text-accent transition-colors uppercase tracking-tight">${item.title}</h4>
            `;
            div.onclick = () => fetchEpisodes(item);
            return div;
        }

        async function fetchEpisodes(anime) {
            const overlay = document.getElementById('overlay');
            const container = document.getElementById('episodesContainer');
            
            document.getElementById('overlayTitle').textContent = anime.title;
            overlay.classList.remove('pointer-events-none');
            overlay.classList.add('opacity-100');
            
            container.innerHTML = '<div class="col-span-full py-20 flex justify-center"><div class="w-12 h-12 border-4 border-accent border-t-transparent rounded-full animate-spin"></div></div>';

            const cacheKey = `episodes_${anime.anime_id}`;
            let episodes = apiCache.get(cacheKey);

            if (!episodes) {
                try {
                    const res = await fetch(`${API_BASE}/anime/episode/${anime.anime_id}`);
                    const data = await res.json();
                    episodes = data.episodes || [];
                    apiCache.set(cacheKey, episodes);
                } catch (e) {
                    container.innerHTML = '<p class="col-span-full text-center text-accent">Failed to load episodes.</p>';
                    return;
                }
            }

            container.innerHTML = '';
            episodes.forEach(ep => {
                const btn = document.createElement('button');
                btn.className = 'py-3 rounded-xl bg-secondary border border-white/5 font-black text-sm hover:bg-accent hover:border-accent transition-all';
                btn.textContent = ep.episode_number;
                btn.onclick = () => startStreaming(anime, ep, episodes);
                container.appendChild(btn);
            });
            
            // Auto play first ep
            if (episodes.length > 0) {
                setTimeout(() => startStreaming(anime, episodes[0], episodes), 100);
            }
        }

        function closeOverlay() {
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('pointer-events-none');
        }

        async function startStreaming(anime, episode, allEpisodes) {
            closeOverlay();
            document.getElementById('homeSection').style.display = 'none';
            document.getElementById('heroSection').style.display = 'none';
            document.getElementById('searchResultsSection').style.display = 'none';
            document.getElementById('streamingSection').style.display = 'block';
            
            currentStreamData = {
                id: episode.episode_id,
                title: anime.title,
                ep: episode.episode_number,
                episodes: allEpisodes
            };

            document.getElementById('streamTitle').textContent = anime.title;
            document.getElementById('currentEpLabel').textContent = `EPISODE ${episode.episode_number}`;
            
            renderEpisodesList();
            loadStream();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderEpisodesList() {
            const list = document.getElementById('episodesList');
            list.innerHTML = '';
            currentStreamData.episodes.forEach(ep => {
                const isActive = ep.episode_id === currentStreamData.id;
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-5 py-4 rounded-2xl font-bold text-sm transition-all border ${isActive ? 'bg-accent border-accent text-white' : 'bg-secondary border-white/5 text-white/60 hover:border-white/20'}`;
                btn.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span>Episode ${ep.episode_number}</span>
                        ${isActive ? '<svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' : ''}
                    </div>
                `;
                btn.onclick = () => {
                    currentStreamData.id = ep.episode_id;
                    currentStreamData.ep = ep.episode_number;
                    document.getElementById('currentEpLabel').textContent = `EPISODE ${ep.episode_number}`;
                    renderEpisodesList();
                    loadStream();
                };
                list.appendChild(btn);
            });
        }

        async function loadStream() {
            const video = document.getElementById('roVideoEl');
            const iframeWrap = document.getElementById('roIframeWrap');
            const spinner = document.getElementById('roSpinner');
            const badge = document.getElementById('streamStatusBadge');

            // Reset
            if (hlsInstance) hlsInstance.destroy();
            video.pause();
            video.style.display = 'none';
            iframeWrap.style.display = 'none';
            iframeWrap.innerHTML = '';
            spinner.classList.remove('hidden');
            badge.textContent = 'CONNECTING...';

            if (currentServer === 1) {
                try {
                    const res = await fetch(`${API_BASE}/stream/v2/${currentStreamData.id}`);
                    const data = await res.json();
                    const m3u8 = data[currentAudioTrack]?.m3u8;

                    if (!m3u8) throw new Error('No stream found');

                    video.style.display = 'block';
                    if (Hls.isSupported()) {
                        hlsInstance = new Hls();
                        hlsInstance.loadSource(m3u8);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                            video.play();
                            spinner.classList.add('hidden');
                            badge.textContent = '● HLS LIVE';
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = m3u8;
                        video.play();
                        spinner.classList.add('hidden');
                        badge.textContent = '● NATIVE HLS';
                    }
                } catch (e) {
                    badge.textContent = 'ERROR - TRY IFRAME';
                    spinner.classList.add('hidden');
                }
            } else {
                const url = `https://megaplay.buzz/stream/s-2/${currentStreamData.id}/${currentAudioTrack}`;
                iframeWrap.innerHTML = `<iframe src="${url}" class="w-full h-full" allowfullscreen allow="autoplay"></iframe>`;
                iframeWrap.style.display = 'block';
                spinner.classList.add('hidden');
                badge.textContent = '● IFRAME';
            }
        }

        function switchAudioTrack(track) {
            currentAudioTrack = track;
            document.getElementById('subBtn').classList.toggle('bg-accent', track === 'sub');
            document.getElementById('dubBtn').classList.toggle('bg-accent', track === 'dub');
            loadStream();
        }

        function switchServer(server) {
            currentServer = server;
            document.getElementById('srv1Btn').classList.toggle('bg-accent', server === 1);
            document.getElementById('srv2Btn').classList.toggle('bg-accent', server === 2);
            loadStream();
        }

        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            searchInput.oninput = (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim();
                if (query.length < 3) {
                    document.getElementById('suggestions').classList.add('hidden');
                    return;
                }
                searchTimeout = setTimeout(() => performSearch(query), 500);
            };

            // Player logic
            const video = document.getElementById('roVideoEl');
            const playBtn = document.getElementById('roPlayPause');
            const centerPlay = document.getElementById('roCenterPlay');
            
            const togglePlay = () => {
                if (video.paused) {
                    video.play();
                    centerPlay.classList.add('opacity-0');
                } else {
                    video.pause();
                    centerPlay.classList.remove('opacity-0');
                }
            };

            playBtn.onclick = togglePlay;
            centerPlay.onclick = togglePlay;
            video.onclick = togglePlay;

            video.ontimeupdate = () => {
                const prog = (video.currentTime / video.duration) * 100;
                document.getElementById('roProgFill').style.width = `${prog}%`;
                document.getElementById('roCurTime').textContent = formatTime(video.currentTime);
                document.getElementById('roDur').textContent = formatTime(video.duration);
            };

            document.getElementById('roFullscreen').onclick = () => {
                if (video.requestFullscreen) video.requestFullscreen();
            };
        }

        async function performSearch(query) {
            try {
                const res = await fetch(`${API_BASE}/search/${query}`);
                const data = await res.json();
                const results = data.results || [];
                
                const grid = document.getElementById('searchGrid');
                const section = document.getElementById('searchResultsSection');
                const home = document.getElementById('homeSection');
                const hero = document.getElementById('heroSection');
                const stream = document.getElementById('streamingSection');

                grid.innerHTML = '';
                results.forEach(item => grid.appendChild(createAnimeCard(item)));
                
                home.style.display = 'none';
                hero.style.display = 'none';
                stream.style.display = 'none';
                section.style.display = 'block';
                document.getElementById('searchQueryTitle').textContent = `Results for: ${query}`;
            } catch (e) {
                console.error('Search failed');
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return h > 0 ? `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` : `${m}:${s.toString().padStart(2, '0')}`;
        }
    </script>
</body>
</html>
