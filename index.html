<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO-ANIME - Search & Stream</title>
    <style>
        /* ===== BLACK & PINK THEME ===== */
        :root {
            --primary-black: #0a0a0a;
            --secondary-black: #1a1a1a;
            --tertiary-black: #2a2a2a;
            --accent-pink: #ff006e;
            --accent-pink-light: #ff1493;
            --accent-pink-dark: #c2185b;
            --accent-neon: #ff0080;
            --text-primary: #ffffff;
            --text-secondary: #e0e0e0;
            --text-tertiary: #a0a0a0;
            --border-color: #333333;
            --shadow-sm: 0 2px 8px rgba(255, 0, 110, 0.1);
            --shadow-md: 0 8px 24px rgba(255, 0, 110, 0.2);
            --shadow-lg: 0 16px 48px rgba(255, 0, 110, 0.3);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--primary-black) 0%, #1a0a15 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.6;
        }

        html {
            scroll-behavior: smooth;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--secondary-black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-pink);
            border-radius: 5px;
            transition: background var(--transition-fast);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-pink-light);
        }

        /* ===== SPLASH SCREEN ===== */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.6s ease-out;
        }

        #splashScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-content {
            text-align: center;
            animation: splashPulse 2s ease-in-out infinite;
        }

        @keyframes splashPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .splash-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid var(--accent-pink);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.6);
            animation: splashGlow 2s ease-in-out infinite;
        }

        @keyframes splashGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(255, 0, 110, 0.6); }
            50% { box-shadow: 0 0 80px rgba(255, 0, 110, 1); }
        }

        .splash-logo img {
            width: 90%;
            height: 90%;
            border-radius: 50%;
            object-fit: cover;
        }

        .splash-text {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent-pink);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            animation: splashText 1.5s ease-in-out infinite;
        }

        @keyframes splashText {
            0%, 100% { opacity: 1; transform: translateY(0); }
            50% { opacity: 0.7; transform: translateY(-5px); }
        }

        .splash-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }

        .splash-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-pink);
            animation: splashDot 1.2s ease-in-out infinite;
        }

        .splash-dot:nth-child(1) { animation-delay: 0s; }
        .splash-dot:nth-child(2) { animation-delay: 0.2s; }
        .splash-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes splashDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(180deg, var(--secondary-black) 0%, rgba(26, 26, 26, 0.8) 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-pink);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            animation: slideDown 0.6s var(--transition-smooth);
            gap: 12px;
            flex-wrap: wrap;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .logo {
            color: var(--text-primary);
            font-weight: 900;
            font-size: 18px;
            letter-spacing: -1px;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition-fast);
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }

        .logo:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .logo-gojo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--accent-pink);
            background: var(--tertiary-black);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 110, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 110, 0.8); }
        }

        .logo-gojo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-container {
            display: flex;
            flex: 1;
            min-width: 200px;
            max-width: 500px;
            position: relative;
            gap: 8px;
        }

        .search-container input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            background: var(--tertiary-black);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: all var(--transition-fast);
        }

        .search-container input::placeholder {
            color: var(--text-tertiary);
        }

        .search-container input:focus {
            background: var(--secondary-black);
            border-color: var(--accent-pink);
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.3);
        }

        .search-container button {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-neon));
            border: none;
            color: white;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 10px;
            transition: all var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);
            white-space: nowrap;
            flex-shrink: 0;
        }

        @media (min-width: 480px) {
            .search-container button {
                padding: 10px 14px;
                font-size: 10.5px;
                letter-spacing: 0.4px;
            }
        }

        @media (min-width: 768px) {
            .search-container button {
                padding: 10px 16px;
                font-size: 11px;
                letter-spacing: 0.5px;
            }
        }

        .search-container button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 0, 110, 0.5);
        }

        .search-container button:active {
            transform: scale(0.98);
        }

        /* ===== HERO BANNER ===== */
        #heroBanner {
            display: none;
            width: 100%;
            height: 300px;
            background: var(--secondary-black);
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border: 2px solid var(--accent-pink);
        }

        @media (min-width: 768px) {
            #heroBanner {
                display: block;
                height: 400px;
            }
        }

        @media (min-width: 1024px) {
            #heroBanner {
                height: 500px;
                margin-bottom: 40px;
            }
        }

        .hero-slider-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background-size: cover;
            background-position: center;
            filter: brightness(0.5) saturate(1.3);
        }

        .hero-slide.active {
            opacity: 1;
            animation: zoomIn 1.2s ease-out;
        }

        @keyframes zoomIn {
            from { transform: scale(1.05); }
            to { transform: scale(1); }
        }

        .hero-slide-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(10, 10, 10, 0.9) 0%, rgba(10, 10, 10, 0.5) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }

        @media (min-width: 768px) {
            .hero-slide-overlay {
                padding: 40px;
            }
        }

        @media (min-width: 1024px) {
            .hero-slide-overlay {
                padding: 60px;
            }
        }

        .hero-slide-title {
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 12px 0;
            color: var(--text-primary);
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.8);
            max-width: 400px;
            line-height: 1.1;
            animation: slideInLeft 0.8s var(--transition-smooth);
        }

        @media (min-width: 768px) {
            .hero-slide-title {
                font-size: 36px;
                max-width: 500px;
            }
        }

        @media (min-width: 1024px) {
            .hero-slide-title {
                font-size: 48px;
                max-width: 600px;
            }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hero-slide-ep {
            font-size: 12px;
            color: var(--accent-pink);
            font-weight: 700;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
            background: rgba(255, 0, 110, 0.15);
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 0, 110, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: slideInLeft 0.8s var(--transition-smooth) 0.1s both;
        }

        @media (min-width: 768px) {
            .hero-slide-ep {
                font-size: 14px;
                padding: 8px 16px;
            }
        }

        .hero-controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .hero-controls {
                bottom: 30px;
                right: 40px;
                gap: 12px;
            }
        }

        .hero-nav-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 0, 110, 0.15);
            color: var(--accent-pink);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            backdrop-filter: blur(10px);
            border: 2px solid var(--accent-pink);
        }

        @media (min-width: 768px) {
            .hero-nav-btn {
                width: 48px;
                height: 48px;
                font-size: 20px;
            }
        }

        .hero-nav-btn:hover {
            background: var(--accent-pink);
            color: var(--primary-black);
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(255, 0, 110, 0.5);
        }

        .hero-nav-btn:active {
            transform: scale(0.95);
        }

        /* ===== MAIN CONTENT ===== */
        main {
            padding: 20px 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            main {
                padding: 30px 24px;
            }
        }

        @media (min-width: 1024px) {
            main {
                padding: 40px 24px;
            }
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            margin: 25px 0 16px 0;
            border-bottom: 3px solid var(--accent-pink);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeInUp 0.6s var(--transition-smooth);
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 24px;
                margin: 30px 0 20px 0;
                padding-bottom: 14px;
            }
        }

        @media (min-width: 1024px) {
            .section-title {
                font-size: 28px;
                margin: 40px 0 24px 0;
            }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--accent-pink), var(--accent-neon));
            border-radius: 3px;
            animation: scaleY 0.8s var(--transition-smooth);
        }

        @media (min-width: 768px) {
            .section-title::before {
                height: 24px;
                width: 5px;
            }
        }

        @keyframes scaleY {
            from { transform: scaleY(0); }
            to { transform: scaleY(1); }
        }

        /* ===== GRID LAYOUT ===== */
        #grid, #famousGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s var(--transition-smooth) 0.2s both;
        }

        @media (min-width: 480px) {
            #grid, #famousGrid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 14px;
            }
        }

        @media (min-width: 768px) {
            #grid, #famousGrid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 18px;
                margin-bottom: 40px;
            }
        }

        @media (min-width: 1024px) {
            #grid, #famousGrid {
                grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
                gap: 24px;
                margin-bottom: 60px;
            }
        }

        /* ===== CARD COMPONENT ===== */
        .card {
            background: var(--tertiary-black);
            border-radius: 10px;
            overflow: hidden;
            transition: all var(--transition-smooth);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border: 2px solid var(--border-color);
            box-shadow: var(--shadow-md);
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--accent-pink);
            box-shadow: 0 20px 40px rgba(255, 0, 110, 0.3), var(--shadow-lg);
        }

        .card:active {
            transform: translateY(-6px) scale(1.01);
        }

        .card-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 142%;
            background: linear-gradient(135deg, var(--secondary-black), var(--tertiary-black));
            overflow: hidden;
        }

        .card-img-wrapper.loading {
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        .card img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        .card img.loaded {
            opacity: 1;
            animation: imageLoad 0.5s ease-out;
        }

        @keyframes imageLoad {
            from { filter: blur(10px); }
            to { filter: blur(0); }
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .card-info {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: var(--tertiary-black);
        }

        @media (min-width: 768px) {
            .card-info {
                padding: 14px;
            }
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        @media (min-width: 768px) {
            .card-title {
                font-size: 13px;
                margin-bottom: 8px;
            }
        }

        .card-meta {
            font-size: 10px;
            color: var(--accent-pink);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (min-width: 768px) {
            .card-meta {
                font-size: 11px;
            }
        }

        /* ===== STREAMING SECTION ===== */
        #streamingSection {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 20px;
            background: var(--secondary-black);
            border: 2px solid var(--accent-pink);
            transition: all var(--transition-fast);
        }

        .video-container.hidden {
            display: none;
        }

        @media (min-width: 768px) {
            .video-container {
                margin-bottom: 24px;
            }
        }

        @media (min-width: 1024px) {
            .video-container {
                margin-bottom: 32px;
            }
        }

        #animePlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }

        .player-info {
            background: linear-gradient(135deg, var(--secondary-black), var(--tertiary-black));
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--accent-pink);
            animation: slideUp 0.6s var(--transition-smooth);
            margin-bottom: 24px;
        }

        @media (min-width: 768px) {
            .player-info {
                padding: 24px;
            }
        }

        @media (min-width: 1024px) {
            .player-info {
                padding: 32px;
            }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .anime-title {
            font-size: 24px;
            font-weight: 900;
            margin: 0 0 8px 0;
            color: var(--text-primary);
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (min-width: 768px) {
            .anime-title {
                font-size: 30px;
                margin-bottom: 10px;
            }
        }

        @media (min-width: 1024px) {
            .anime-title {
                font-size: 36px;
                margin-bottom: 12px;
            }
        }

        .episode-label {
            font-size: 12px;
            color: var(--accent-pink);
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (min-width: 768px) {
            .episode-label {
                font-size: 14px;
                margin-bottom: 20px;
            }
        }

        .navigation-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        @media (min-width: 768px) {
            .navigation-controls {
                gap: 16px;
            }
        }

        .nav-btn {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-neon));
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition-fast);
            flex: 1;
            min-width: 120px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.3);
        }

        @media (min-width: 768px) {
            .nav-btn {
                min-width: 140px;
                font-size: 13px;
                padding: 13px 24px;
            }
        }

        @media (min-width: 1024px) {
            .nav-btn {
                min-width: 150px;
                font-size: 14px;
                padding: 14px 28px;
            }
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255, 0, 110, 0.5);
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .prev-btn {
            background: linear-gradient(135deg, var(--accent-pink-dark), var(--accent-pink));
        }

        /* ===== EPISODES SECTION ===== */
        .episodes-section {
            display: none;
            animation: fadeInUp 0.6s var(--transition-smooth);
        }

        .episodes-section.active {
            display: block;
        }

        .episodes-header {
            display: flex;

            const slide = document.createElement("div");
            slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
            slide.style.backgroundImage = `url('${anime.image}')`;
            
            const overlay = document.createElement("div");
            overlay.className = "hero-slide-overlay";
            overlay.innerHTML = `
                <h2 class="hero-slide-title">${anime.title}</h2>
                <span class="hero-slide-ep">FEATURED • HD</span>
            `;
            
            slide.appendChild(overlay);
            container.appendChild(slide);
        });

        setInterval(() => {
            heroSlideIndex = (heroSlideIndex + 1) % 5;
            updateHeroSlide();
        }, 6000);
    }

    function updateHeroSlide() {
        const slides = document.querySelectorAll(".hero-slide");
        slides.forEach((slide, index) => {
            slide.classList.toggle("active", index === heroSlideIndex);
        });
    }

    function heroPrevSlide() {
        heroSlideIndex = (heroSlideIndex - 1 + 5) % 5;
        updateHeroSlide();
    }

    function heroNextSlide() {
        heroSlideIndex = (heroSlideIndex + 1) % 5;
        updateHeroSlide();
    }

    // ===== ASYNC IMAGE LOADING =====
    function startAsyncImageLoading() {
        if (isLoadingImages) return;
        isLoadingImages = true;

        const loadNextBatch = () => {
            const batch = imageLoadQueue.splice(0, 4);
            if (batch.length === 0) {
                isLoadingImages = false;
                return;
            }

            batch.forEach(img => {
                if (img && !img.src) {
                    img.src = img.dataset.src;
                }
            });

            requestAnimationFrame(() => {
                setTimeout(loadNextBatch, 100);
            });
        };

        loadNextBatch();
    }

    // ===== CARD CREATION =====
    function createCard(element, isStatic = false) {
        const card = document.createElement("div");
        card.className = "card";

        const imgWrapper = document.createElement("div");
        imgWrapper.className = "card-img-wrapper loading";

        const img = document.createElement("img");
        img.loading = "lazy";

        img.onload = () => {
            imgWrapper.classList.remove("loading");
            img.classList.add("loaded");
        };

        img.onerror = () => {
            imgWrapper.classList.remove("loading");
            imgWrapper.style.background = "var(--tertiary-black)";
            imgWrapper.innerHTML = `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:9px;color:var(--text-tertiary);text-align:center;">IMAGE<br>UNAVAILABLE</div>`;
        };

        const imageUrl = element.poster || element.image || element.thumbnail || element.img || "";
        
        if (imageUrl) {
            img.dataset.src = imageUrl;
            imageLoadQueue.push(img);
        }

        imgWrapper.appendChild(img);

        const overlay = document.createElement("div");
        overlay.className = "card-overlay";
        imgWrapper.appendChild(overlay);

        const info = document.createElement("div");
        info.className = "card-info";

        const title = document.createElement("div");
        title.className = "card-title";
        title.textContent = element.title;

        const meta = document.createElement("div");
        meta.className = "card-meta";
        meta.textContent = "Series • HD";

        info.appendChild(title);
        info.appendChild(meta);

        card.appendChild(imgWrapper);
        card.appendChild(info);

        card.addEventListener("click", () => {
            if (isStatic) {
                document.getElementById("searchInput").value = element.title;
                searchAnime();
            } else {
                fetchEpisodes(element);
            }
        });

        return card;
    }

    // ===== SEARCH =====
    async function searchAnime() {
        const query = document.getElementById("searchInput").value;
        if (!query) return;
        
        const grid = document.getElementById("grid");

        grid.innerHTML = "";
        document.getElementById("searchResultsSection").style.display = "block";
        document.getElementById("homeSection").style.display = "none";
        document.getElementById("streamingSection").style.display = "none";
        document.getElementById("heroBanner").style.display = "none";

        try {
            const response = await fetch(`https://anime-search-api-burw.onrender.com/search/${encodeURIComponent(query)}`);
            const Data = await response.json();

            if (Data.results && Data.results.length > 0) {
                const fragment = document.createDocumentFragment();

                Data.results.forEach((element, index) => {
                    const card = createCard(element);
                    card.style.animationDelay = `${index * 0.05}s`;
                    fragment.appendChild(card);
                });

                grid.appendChild(fragment);
                startAsyncImageLoading();
            } else {
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 30px; color: var(--text-tertiary);'>No results found.</p>";
            }
        } catch (error) {
            grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: var(--accent-pink); padding: 30px;'>Error: API connection failed.</p>";
        }
    }

    // ===== FETCH EPISODES =====
    async function fetchEpisodes(anime) {
        const overlay = document.getElementById("episodeOverlay");
        const container = document.getElementById("episodesContainer");
        
        container.innerHTML = `
            <div class="episode-loading">
                <div class="episode-spinner"></div>
                <div class="episode-loading-text">LOADING EPISODES...</div>
            </div>
        `;
        
        document.getElementById("overlayTitle").textContent = anime.title;
        overlay.classList.add("active");

        try {
            const response = await fetch(`https://anime-search-api-burw.onrender.com/anime/episode/${anime.anime_id}`);
            const data = await response.json();
            container.innerHTML = "";

            const episodesList = data.episodes || data.episode_data || [];

            if (episodesList && episodesList.length > 0) {
                const fragment = document.createDocumentFragment();
                
                episodesList.forEach((ep, index) => {
                    const epBox = document.createElement("div");
                    epBox.className = "episode-item";
                    epBox.textContent = `EP ${ep.episode_number}`;
                    epBox.style.animationDelay = `${index * 0.03}s`;
                    epBox.addEventListener("click", () => startStreaming(anime, ep, episodesList));
                    fragment.appendChild(epBox);
                });
                
                container.appendChild(fragment);
                prefetchEpisodeDataAsync(anime, episodesList);
                startStreaming(anime, episodesList[0], episodesList);
            } else {
                container.innerHTML = "<p style='text-align: center; padding: 30px; color: var(--text-tertiary);'>No episodes found.</p>";
            }
        } catch (error) {
            container.innerHTML = "<p style='color: var(--accent-pink); text-align: center; padding: 30px;'>Error fetching episodes.</p>";
        }
    }

    // ===== BACKGROUND PREFETCH =====
    async function prefetchEpisodeDataAsync(anime, episodesList) {
        setTimeout(async () => {
            try {
                const episodeNumbers = [1, 2, 3, 4, 5, 6, 7, 8];
                
                for (const epNum of episodeNumbers) {
                    const epCacheKey = `${anime.anime_id}-${epNum}`;
                    
                    if (!episodePrefetchCache[epCacheKey]) {
                        try {
                            const prefetchResponse = await fetch(
                                `https://anime-search-api-burw.onrender.com/anime/episode/${anime.anime_id}`,
                                { 
                                    method: 'GET',
                                    headers: { 'X-Prefetch': 'true' },
                                    priority: 'low'
                                }
                            );
                            
                            if (prefetchResponse.ok) {
                                episodePrefetchCache[epCacheKey] = await prefetchResponse.json();
                            }
                        } catch (e) {}
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
            } catch (error) {}
        }, 500);
    }

    // ===== START STREAMING (ORIGINAL LOGIC PRESERVED) =====
    async function startStreaming(anime, episode, allEpisodes) {
        closeOverlay();
        document.getElementById("searchResultsSection").style.display = "none";
        document.getElementById("homeSection").style.display = "none";
        document.getElementById("heroBanner").style.display = "none";
        document.getElementById("streamingSection").style.display = "block";

        currentStreamData = {
            id: episode.episode_id,
            title: anime.title,
            ep: parseInt(episode.episode_number),
            episodes: allEpisodes
        };

        // STREAMING LOGIC - ORIGINAL CODE PRESERVED
        document.getElementById('animePlayer').src = `https://megaplay.buzz/stream/s-2/${episode.episode_id}/sub`;
        updatePlayerUI();
        renderEpisodesList();

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== UPDATE PLAYER UI =====
    function updatePlayerUI() {
        document.getElementById('displayTitle').textContent = currentStreamData.title;
        document.getElementById('displayEpisode').textContent = `Episode ${currentStreamData.ep}`;
        document.getElementById('prevBtn').disabled = (currentStreamData.ep <= 1);
        document.getElementById('nextBtn').disabled = (currentStreamData.ep >= currentStreamData.episodes.length);
    }

    // ===== RENDER EPISODES LIST =====
    function renderEpisodesList() {
        const grid = document.getElementById('episodesGrid');
        grid.innerHTML = '';
        
        const displayLimit = viewAllMode ? currentStreamData.episodes.length : 50;
        const episodesToShow = currentStreamData.episodes.slice(0, displayLimit);

        episodesToShow.forEach((ep, index) => {
            const epBox = document.createElement("div");
            epBox.className = "episode-item";
            if (parseInt(ep.episode_number) === currentStreamData.ep) {
                epBox.classList.add("current");
            }
            epBox.textContent = `EP ${ep.episode_number}`;
            epBox.addEventListener("click", () => startStreaming({title: currentStreamData.title}, ep, currentStreamData.episodes));
            grid.appendChild(epBox);
        });
    }

    // ===== TOGGLE VIEW ALL EPISODES =====
    function toggleViewAllEpisodes() {
        viewAllMode = !viewAllMode;
        const btn = document.querySelector('.view-all-btn');
        const container = document.getElementById('videoContainer');
        
        if (viewAllMode) {
            btn.textContent = 'HIDE PLAYER';
            container.classList.add('hidden');
        } else {
            btn.textContent = 'VIEW ALL';
            container.classList.remove('hidden');
        }
        
        renderEpisodesList();
    }

    // ===== CHANGE EPISODE =====
    function changeEpisode(delta) {
        const nextEpNum = currentStreamData.ep + delta;
        const nextEp = currentStreamData.episodes.find(e => parseInt(e.episode_number) === nextEpNum);
        if (nextEp) {
            startStreaming({title: currentStreamData.title}, nextEp, currentStreamData.episodes);
        }
    }

    // ===== NAVIGATION =====
    function goHome() {
        document.getElementById("streamingSection").style.display = "none";
        document.getElementById("searchResultsSection").style.display = "none";
        document.getElementById("homeSection").style.display = "block";
        if (window.innerWidth >= 768) {
            document.getElementById("heroBanner").style.display = "block";
        }
        document.getElementById("searchInput").value = "";
        document.getElementById('animePlayer').src = "";
        viewAllMode = false;
    }

    function closeOverlay() {
        document.getElementById("episodeOverlay").classList.remove("active");
    }

    // ===== EVENT LISTENERS =====
    document.getElementById("searchInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") searchAnime();
    });

    document.getElementById("episodeOverlay").addEventListener("click", (e) => {
        if (e.target.id === "episodeOverlay") closeOverlay();
    });

    // Initialize
    initHome();
</script>
